name: Release

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build_linux:
    name: Build Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: third_party
          key: ${{ runner.os }}-deps-${{ hashFiles('build-deps.sh') }}

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y $(cat tools/requirements-ubuntu.txt)
          ./build-deps.sh
        shell: bash

      - name: Build
        run: |
          set -o pipefail
          CC=clang CXX=clang++ cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel 2>&1 | tee build.log
        shell: bash

      - name: Package TGZ
        run: |
          set -euo pipefail
          cpack -G TGZ --config build/CPackConfig.cmake

          TGZ_PATH="$(find . -maxdepth 1 -type f -name '*.tar.gz' | head -n 1)"
          if [ -z "${TGZ_PATH}" ]; then
            echo "No .tar.gz package found in build/"
            exit 1
          fi

          SHORT_SHA="${GITHUB_SHA::7}"
          TGZ_NAME="3SX-${SHORT_SHA}-linux.tar.gz"
          mv "${TGZ_PATH}" "${TGZ_NAME}"
        shell: bash

      - name: Upload Linux release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-linux
          path: |
            3SX-*-linux.tar.gz

      - name: Upload Linux build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-linux
          path: build.log

  build_windows:
    name: Build Windows
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - id: msys2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: MINGW64

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install MSYS2 packages
        run: tr -d '\r' < tools/requirements-windows.txt | xargs pacman -S --needed --noconfirm

      - name: Build dependencies
        run: sh build-deps.sh

      - name: Build
        run: |
          set -o pipefail

          CC=clang CXX=clang++ cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DMSYS2_LOCATION=${{ steps.msys2.outputs.msys2-location }}

          cmake --build build --parallel 2>&1 | tee build.log

      - name: Install
        run: cmake --install build --prefix dist

      - name: Package ZIP
        shell: pwsh
        run: |
          $shortSha = "${env:GITHUB_SHA}".Substring(0, 7)
          $archiveName = "3SX-$shortSha-windows.zip"

          Compress-Archive -Path "dist\*" -DestinationPath $archiveName -Force

      - name: Upload Windows release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-windows
          path: |
            3SX-*-windows.zip

      - name: Upload Windows build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-windows
          path: build.log

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
      - build_linux
      - build_windows

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          merge-multiple: true
          path: release-assets

      - name: Move rolling release tag to current commit
        env:
          TAG_NAME: rolling-pre-release
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "${TAG_NAME}" "${GITHUB_SHA}"
          git push origin "refs/tags/${TAG_NAME}" --force

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: rolling-pre-release
          FULL_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          SHORT_SHA="${FULL_SHA:0:7}"

          touch notes.md
          echo "Automatic release for commit ${FULL_SHA}" >> notes.md
          echo >> notes.md
          echo "⚠️ **Disclaimer** ⚠️: This is a __pre-release__ build. Expect bugs and instability." >> notes.md

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release edit "${TAG_NAME}" \
              --title "${SHORT_SHA}" \
              --prerelease \
              --notes-file notes.md

            for asset in $(gh release view "${TAG_NAME}" --json assets --jq '.assets[].name'); do
              gh release delete-asset "${TAG_NAME}" "${asset}" --yes
            done

            gh release upload "${TAG_NAME}" release-assets/* --clobber
          else
            gh release create "${TAG_NAME}" release-assets/* \
              --title "${SHORT_SHA}" \
              --prerelease \
              --notes-file notes.md
          fi
