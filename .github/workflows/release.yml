name: Release

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build_linux:
    name: Build Linux (x86_64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: third_party
          key: ${{ runner.os }}-deps-${{ hashFiles('build-deps.sh') }}

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y $(cat tools/requirements-ubuntu.txt)
          ./build-deps.sh
        shell: bash

      - name: Build
        run: |
          set -o pipefail
          CC=clang CXX=clang++ cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel 2>&1 | tee build.log
        shell: bash

      - name: Package TGZ
        run: |
          set -euo pipefail
          cpack -G TGZ --config build/CPackConfig.cmake

          TGZ_PATH="$(find . -maxdepth 1 -type f -name '*.tar.gz' | head -n 1)"
          if [ -z "${TGZ_PATH}" ]; then
            echo "No .tar.gz package found in build/"
            exit 1
          fi

          SHORT_SHA="${GITHUB_SHA::7}"
          TGZ_NAME="3SX-${SHORT_SHA}-linux-x86_64.tar.gz"
          mv "${TGZ_PATH}" "${TGZ_NAME}"
        shell: bash

      - name: Upload Linux release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-linux
          path: |
            3SX-*-linux-x86_64.tar.gz

      - name: Upload Linux build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-linux
          path: build.log

  build_linux_arm64:
    name: Build Linux (ARM64 / Raspberry Pi)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install cross-compilation toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            cmake ninja-build \
            git curl xz-utils make pkg-config python3 \
            nasm yasm ca-certificates
        shell: bash

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: third_party
          key: linux-arm64-deps-${{ hashFiles('build-deps.sh') }}

      - name: Build third-party dependencies (cross-compiled)
        run: |
          set -euo pipefail

          # Tell build-deps.sh to cross-compile for ARM64
          export CC=aarch64-linux-gnu-gcc
          export CXX=aarch64-linux-gnu-g++
          export AR=aarch64-linux-gnu-ar
          export RANLIB=aarch64-linux-gnu-ranlib
          export STRIP=aarch64-linux-gnu-strip

          # Extra CMake flags forwarded to every cmake call inside build-deps.sh
          export CMAKE_TOOLCHAIN_FLAGS="\
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            -DCMAKE_FIND_ROOT_PATH_MODE_PROGRAM=NEVER \
            -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=ONLY \
            -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=ONLY"

          ./build-deps.sh
        shell: bash

      - name: Build project (cross-compiled)
        run: |
          set -o pipefail
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            -DCMAKE_FIND_ROOT_PATH_MODE_PROGRAM=NEVER \
            -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=ONLY \
            -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=ONLY
          cmake --build build --parallel $(nproc) 2>&1 | tee build.log
        shell: bash

      - name: Package TGZ
        run: |
          set -euo pipefail
          cpack -G TGZ --config build/CPackConfig.cmake

          TGZ_PATH="$(find . -maxdepth 1 -type f -name '*.tar.gz' | head -n 1)"
          if [ -z "${TGZ_PATH}" ]; then
            echo "No .tar.gz package found"
            exit 1
          fi

          SHORT_SHA="${GITHUB_SHA::7}"
          mv "${TGZ_PATH}" "3SX-${SHORT_SHA}-linux-arm64.tar.gz"
        shell: bash

      - name: Upload ARM64 release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-linux-arm64
          path: |
            3SX-*-linux-arm64.tar.gz

      - name: Upload ARM64 build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-linux-arm64
          path: build.log

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
      - build_linux
      - build_linux_arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          merge-multiple: true
          path: release-assets

      - name: Move rolling release tag to current commit
        env:
          TAG_NAME: rolling-pre-release
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "${TAG_NAME}" "${GITHUB_SHA}"
          git push origin "refs/tags/${TAG_NAME}" --force

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: rolling-pre-release
          FULL_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          SHORT_SHA="${FULL_SHA:0:7}"

          touch notes.md
          echo "Automatic release for commit ${FULL_SHA}" >> notes.md
          echo >> nodes.md
          echo "⚠️ **Disclaimer** ⚠️: This is a __pre-release__ build. Expect bugs and instability." >> notes.md

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release edit "${TAG_NAME}" \
              --title "${SHORT_SHA}" \
              --prerelease \
              --notes-file notes.md

            for asset in $(gh release view "${TAG_NAME}" --json assets --jq '.assets[].name'); do
              gh release delete-asset "${TAG_NAME}" "${asset}" --yes
            done

            gh release upload "${TAG_NAME}" release-assets/* --clobber
          else
            gh release create "${TAG_NAME}" release-assets/* \
              --title "${SHORT_SHA}" \
              --prerelease \
              --notes-file notes.md
          fi
