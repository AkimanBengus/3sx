name: Test Build Raspberry Pi

on:
  workflow_dispatch:

jobs:
  build_rpi_arm64:
    name: Build Raspberry Pi (ARM64 - Cross-Compilation)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: third_party
          key: ${{ runner.os }}-rpi-deps-${{ hashFiles('build-deps.sh') }}

      - name: Install Cross-Compiler and Architecture Libraries
        run: |
          sudo apt update
          # Installation du compilateur croisé et des bibliothèques de base essentielles
          sudo apt install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu binutils-aarch64-linux-gnu
          sudo apt install -y $(cat tools/requirements-ubuntu.txt)
        shell: bash

      - name: Build dependencies (Cross-Compiled)
        run: |
          set -o pipefail
          # On configure proprement l'environnement pour que les scripts configure/make de third_party ciblent le Pi
          export CC=aarch64-linux-gnu-gcc
          export CXX=aarch64-linux-gnu-g++
          export AR=aarch64-linux-gnu-ar
          export AS=aarch64-linux-gnu-as
          export RANLIB=aarch64-linux-gnu-ranlib
          
          ./build-deps.sh 2>&1 | tee build-deps.log
        shell: bash

      - name: Build Project with CMake Toolchain
        run: |
          set -o pipefail
          
          # Configuration stricte de la cross-compilation CMake
          cmake -B build \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            -DCMAKE_FIND_ROOT_PATH_MODE_PROGRAM=NEVER \
            -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=ONLY \
            -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=ONLY \
            -DCMAKE_BUILD_TYPE=Release

          cmake --build build --parallel 2>&1 | tee build.log
        shell: bash

      - name: Package TGZ
        run: |
          set -euo pipefail
          cpack -G TGZ --config build/CPackConfig.cmake

          TGZ_PATH="$(find . -maxdepth 1 -type f -name '*.tar.gz' | head -n 1)"
          if [ -z "${TGZ_PATH}" ]; then
            echo "No .tar.gz package found!"
            exit 1
          fi

          SHORT_SHA="${GITHUB_SHA::7}"
          TGZ_NAME="3SX-${SHORT_SHA}-rpi-arm64.tar.gz"
          mv "${TGZ_PATH}" "${TGZ_NAME}"
        shell: bash

      - name: Upload Raspberry Pi release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-rpi
          path: |
            3SX-*-rpi-arm64.tar.gz

      # Étape modifiée pour uploader TOUS les logs disponibles, même s'ils ont échoué
      - name: Upload Raspberry Pi build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-rpi
          path: |
            build-deps.log
            build.log